version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: local-supabase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: supabase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "54322:5432"
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Supabase Auth (Gotrue)
  auth:
    image: supabase/gotrue:latest
    container_name: local-supabase-auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:postgres@postgres:5432/supabase?search_path=auth
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_DISABLE_SIGNUP: false
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
    ports:
      - "9999:9999"
    depends_on:
      - postgres


  # Supabase API (PostgREST)
  api:
    image: postgrest/postgrest:latest
    container_name: local-supabase-api
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@postgres:5432/supabase
      PGRST_DB_SCHEMAS: public,auth
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
    ports:
      - "54321:3000"
    depends_on:
      - postgres

  # Supabase Studio (Database Management UI)
  studio:
    image: supabase/studio:latest
    container_name: local-supabase-studio
    restart: unless-stopped
    environment:
      SUPABASE_URL: http://api:3000
      STUDIO_PG_META_URL: http://localhost:8080
      SUPABASE_ANON_KEY: your-anon-key-here
      SUPABASE_SERVICE_KEY: your-service-role-key-here
    ports:
      - "54323:3000"
    depends_on:
      - api

volumes:
  supabase_db_data:
    driver: local
